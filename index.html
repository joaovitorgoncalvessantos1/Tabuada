<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabuada</title>
    <link rel="stylesheet" href="style/estilo.css">
    <script src="js/script.js" defer ></script>
</head>
<body>
    <h2>Digite um número e confirme para gerar a sua tabuada</h2>
    <form id="multiplication-form">
        <div class="form-control">
            <label for="number">Tabuada do:</label>
            <input type="number" name="number" id="number" placeholder="3">
        </div>

        <div class="form-control">
            <label for="multiplicator">Multiplicar até:</label>
            <input type="number" name="multiplicator" id="multiplicator" value="10" >
        </div>
        <input type="submit" value="Calcular">
        
    </form>
    <div id="multiplication-table">
        <h2 id="multiplication-title">Tabuada do número: </h2>
        <div class="multiplication-operations">
            <p>Informe um numero para calcular uma tabuada</p>

        </div>
    </div>
</body>
</html>
